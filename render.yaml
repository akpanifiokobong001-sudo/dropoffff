# Render blueprint for the DropOff backend (Express API + Postgres).
# Create these resources by pointing Render at this repo (New → Blueprint).
#
# Notes:
# - The web service lives in the server/ subdirectory (rootDir).
# - DATABASE_URL is wired automatically from the managed Postgres below.
# - JWT_SECRET is generated once by Render; auth.js keeps a dev-only fallback.
# - Free Postgres and free web services sleep when idle and the database is
#   time-limited — upgrade to a paid plan for permanent persistence.

databases:
  - name: dropoff-db
    plan: free

services:
  - type: web
    name: dropoff-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dropoff-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Comma-separated list of admin emails. Any account whose email is listed
      # gets the admin role and the admin control page. Set the value in the
      # Render dashboard (sync:false keeps it out of the repo).
      - key: ADMIN_EMAILS
        sync: false
      # Optional hardening: restrict CORS to your Netlify site once you know it.
      # - key: CORS_ORIGIN
      #   value: https://your-site.netlify.app

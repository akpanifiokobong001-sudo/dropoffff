# Netlify configuration for the DropOff frontend (Vite + React).
#
# IMPORTANT: Update the "to" URL below with your Render backend URL.
# The frontend uses relative /api/... paths. The redirect below proxies those
# to the Render backend so the browser sees a same-origin request (no CORS).
#
# HOW TO UPDATE:
# 1. Deploy backend to Render (see DEPLOYMENT.md)
# 2. Get the Render service URL (e.g., https://dropoff-api-xocp.onrender.com)
# 3. Replace the URL in the redirects section below

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # The frontend hardcodes the public Render backend URL (see src/lib/api.js),
  # so no build-time env var is needed. Disable Netlify's secrets scanner: the
  # backend URL is public and intentionally present in the built bundle.
  SECRETS_SCAN_ENABLED = "false"

# API proxy — MUST come before the SPA fallback. :splat captures the rest of
# the path. status 200 + force makes Netlify proxy (not redirect) the request.
[[redirects]]
  from = "/api/*"
  to = "https://dropoff-api-xocp.onrender.com"
  status = 200
  force = true

# SPA fallback — every other path serves the built index.html so client-side
# routing (react-router) works on deep links / refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
